<li class="card">
    <img src="{{ item.image }}" />
    <p>
        <strong>Name: </strong><span class="name">{{ item.name }}</span>
    </p>
    <p>
        <strong>Category: </strong><span class="category">{{ item.category }}</span>
    </p>
    <p>
        <strong>Formula:</strong><span class="formula">{{ item.formula }}</span>
    </p>
    <a class="details-btn" href="/{{ item.id }}/details">Details</a>
</li>
